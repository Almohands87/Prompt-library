<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="author" content="Ahmed Alsarraf (@a_alsarraf80s)">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Workbench — Img2Img Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#15171b;
  --panel:#1d2025;
  --panel-2:#23262c;
  --line:#33373f;
  --text:#eef0f2;
  --muted:#8b909a;
  --amber:#f2a93b;
  --amber-dim:#8a6a2e;
  --teal:#5fb8b3;
  --danger:#e2685c;
  --mono:'IBM Plex Mono',monospace;
  --display:'Space Grotesk',sans-serif;
  --body:'Inter',sans-serif;
  --radius:10px;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:
    radial-gradient(circle at 1px 1px, rgba(255,255,255,0.035) 1px, transparent 1.6px) 0 0/22px 22px,
    var(--bg);
  color:var(--text);
  font-family:var(--body);
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;}
button{font-family:var(--body);cursor:pointer;}
::selection{background:var(--amber);color:#1a1a1a;}

/* ---------- TOP BAR ---------- */
.topbar{
  position:sticky;top:0;z-index:30;
  display:flex;align-items:center;gap:18px;
  padding:14px 24px;
  background:rgba(21,23,27,0.92);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:10px;margin-right:6px;}
.brand .mark{
  width:34px;height:34px;object-fit:contain;flex-shrink:0;
}
.brand h1{font-family:var(--display);font-size:1.05rem;margin:0;letter-spacing:0.2px;}
.brand .tag{font-family:var(--mono);font-size:0.62rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}

.tabs{display:flex;gap:4px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:3px;}
.tab-btn{
  background:transparent;border:none;color:var(--muted);
  font-family:var(--mono);font-size:0.72rem;letter-spacing:0.5px;text-transform:uppercase;
  padding:7px 14px;border-radius:6px;transition:all .15s;
}
.tab-btn.active{background:var(--amber);color:#1a1408;font-weight:600;}
.tab-btn:not(.active):hover{color:var(--text);}

.searchwrap{flex:1;display:flex;justify-content:center;}
.searchbox{
  width:100%;max-width:420px;position:relative;
}
.searchbox input{
  width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--text);
  padding:9px 14px 9px 32px;border-radius:8px;font-size:0.88rem;font-family:var(--body);
}
.searchbox input:focus{outline:none;border-color:var(--amber);}
.searchbox svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:0.5;}

.btn-primary{
  background:var(--amber);color:#1a1408;border:none;font-weight:600;
  padding:9px 16px;border-radius:8px;font-size:0.82rem;white-space:nowrap;
}
.btn-primary:hover{background:#ffbf5c;}

/* ---------- LAYOUT ---------- */
.layout{display:flex;max-width:1400px;margin:0 auto;align-items:flex-start;}
.sidebar{
  width:230px;flex-shrink:0;padding:22px 14px;position:sticky;top:66px;
  height:calc(100vh - 66px);overflow-y:auto;
}
.sidebar h3{
  font-family:var(--mono);font-size:0.68rem;color:var(--muted);letter-spacing:1.5px;
  text-transform:uppercase;margin:18px 8px 8px;
}
.sidebar h3:first-child{margin-top:0;}
.cat-list{list-style:none;margin:0;padding:0;}
.cat-item{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:8px 10px;border-radius:7px;font-size:0.86rem;color:var(--muted);
  cursor:pointer;transition:background .12s,color .12s;
}
.cat-item:hover{background:var(--panel-2);color:var(--text);}
.cat-item.active{background:var(--panel-2);color:var(--amber);font-weight:600;}
.cat-item .count{font-family:var(--mono);font-size:0.68rem;opacity:0.6;}

.tagcloud{display:flex;flex-wrap:wrap;gap:6px;padding:0 8px;}
.tagchip{
  font-family:var(--mono);font-size:0.68rem;padding:4px 9px;border-radius:20px;
  border:1px solid var(--line);color:var(--muted);background:var(--panel-2);
}
.tagchip.active{border-color:var(--teal);color:var(--teal);background:rgba(95,184,179,0.1);}
.tagchip:hover{border-color:var(--amber);color:var(--amber);}

.main{flex:1;min-width:0;padding:22px 24px 60px;}

.section-heading{
  display:flex;align-items:baseline;gap:10px;margin:30px 0 14px;
}
.section-heading:first-child{margin-top:0;}
.section-heading h2{font-family:var(--display);font-size:1.15rem;margin:0;}
.section-heading .n{font-family:var(--mono);color:var(--muted);font-size:0.75rem;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}

/* ---------- CARD ---------- */
.card{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  overflow:hidden;display:flex;flex-direction:column;
}
.card-head{
  padding:14px 16px 10px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;
  border-bottom:1px solid var(--line);
}
.card-title-wrap{min-width:0;}
.card-title{
  font-family:var(--display);font-weight:600;font-size:0.98rem;margin:0 0 4px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.card-title input{
  font-family:var(--display);font-weight:600;font-size:0.98rem;background:var(--panel-2);
  border:1px solid var(--amber);color:var(--text);border-radius:5px;padding:2px 6px;width:100%;
}
.stars{font-size:0.72rem;letter-spacing:1px;color:var(--amber-dim);cursor:pointer;user-select:none;}
.stars .on{color:var(--amber);}
.fav-btn{
  background:none;border:none;font-size:1.05rem;color:var(--muted);flex-shrink:0;padding:2px;line-height:1;
}
.fav-btn.active{color:var(--amber);}

.bestfor{display:flex;flex-wrap:wrap;gap:5px;padding:10px 16px 0;}
.pill{
  font-family:var(--mono);font-size:0.62rem;letter-spacing:0.4px;color:var(--teal);
  background:rgba(95,184,179,0.1);border:1px solid rgba(95,184,179,0.3);
  padding:2px 8px;border-radius:20px;text-transform:uppercase;
}

.stack{padding:12px 16px;display:flex;flex-direction:column;gap:0;}
.seg{position:relative;padding:8px 0 8px 16px;border-left:2px solid var(--line);}
.seg:last-child{border-left:2px solid transparent;}
.seg::before{
  content:'';position:absolute;left:-5px;top:12px;width:8px;height:8px;border-radius:50%;
  background:var(--panel);border:2px solid var(--amber-dim);
}
.seg-label{
  font-family:var(--mono);font-size:0.62rem;letter-spacing:1px;text-transform:uppercase;
  color:var(--amber);display:block;margin-bottom:3px;
}
.seg-text{font-size:0.85rem;line-height:1.45;color:#d6d9de;}
.seg-text textarea{
  width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--text);
  border-radius:6px;padding:6px 8px;font-family:var(--body);font-size:0.83rem;line-height:1.4;
  resize:vertical;min-height:44px;
}
.var{color:var(--amber);font-weight:600;}

.promptbox{
  margin:0 16px 14px;background:#0c0d10;border:1px solid var(--line);border-radius:8px;
  padding:12px 14px;font-family:var(--mono);font-size:0.78rem;line-height:1.55;color:#c9cdd3;
  cursor:pointer;position:relative;max-height:140px;overflow-y:auto;
}
.promptbox:hover{border-color:var(--amber);}
.copyhint{position:absolute;top:6px;right:10px;font-size:0.6rem;color:#555;letter-spacing:0.5px;}

.card-tags{display:flex;flex-wrap:wrap;gap:5px;padding:0 16px 12px;}
.mini-tag{font-family:var(--mono);font-size:0.6rem;color:var(--muted);background:var(--panel-2);padding:2px 7px;border-radius:4px;}

.card-actions{
  display:flex;border-top:1px solid var(--line);margin-top:auto;
}
.card-actions button{
  flex:1;background:none;border:none;border-right:1px solid var(--line);color:var(--muted);
  font-family:var(--mono);font-size:0.65rem;letter-spacing:0.5px;text-transform:uppercase;padding:9px 4px;
  transition:background .12s,color .12s;
}
.card-actions button:last-child{border-right:none;}
.card-actions button:hover{background:var(--panel-2);color:var(--text);}
.card-actions button.save{color:var(--amber);}
.card-actions button.del:hover{color:var(--danger);}

/* ---------- COMPONENTS TAB ---------- */
.block-groups{display:flex;flex-direction:column;gap:26px;}
.block-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
.block-card{
  background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:12px 14px;
  display:flex;flex-direction:column;gap:8px;
}
.block-card .blabel{font-family:var(--mono);font-size:0.66rem;color:var(--teal);text-transform:uppercase;letter-spacing:0.5px;}
.block-card .btext{font-size:0.82rem;line-height:1.4;color:#d6d9de;}
.block-card textarea{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:6px 8px;font-size:0.8rem;min-height:50px;}
.block-actions{display:flex;gap:6px;}
.block-actions button{
  background:var(--panel-2);border:1px solid var(--line);color:var(--muted);border-radius:5px;
  font-family:var(--mono);font-size:0.62rem;padding:4px 8px;text-transform:uppercase;
}
.block-actions button:hover{color:var(--text);border-color:var(--amber);}

/* ---------- BUILDER TAB ---------- */
.builder{display:flex;gap:22px;flex-wrap:wrap;}
.builder-panel{flex:1;min-width:320px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px;}
.builder-panel h3{font-family:var(--display);font-size:1rem;margin:0 0 14px;}
.field{margin-bottom:14px;}
.field label{display:block;font-family:var(--mono);font-size:0.66rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:5px;}
.field select, .field input[type=text]{
  width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--text);
  padding:8px 10px;border-radius:7px;font-size:0.85rem;font-family:var(--body);
}
.field select:focus, .field input:focus{outline:none;border-color:var(--amber);}
.output-panel{flex:1.1;min-width:340px;background:#0c0d10;border:1px solid var(--line);border-radius:12px;padding:20px;position:sticky;top:82px;height:fit-content;}
.output-panel h3{font-family:var(--display);font-size:1rem;margin:0 0 12px;color:var(--amber);}
.output-text{
  font-family:var(--mono);font-size:0.8rem;line-height:1.6;color:#d6d9de;white-space:pre-wrap;
  min-height:120px;padding:12px;background:var(--panel);border:1px solid var(--line);border-radius:8px;margin-bottom:12px;
}

/* ---------- EMPTY / TOAST ---------- */
.empty{padding:60px 20px;text-align:center;color:var(--muted);}
.empty .glyph{font-size:2rem;margin-bottom:10px;}
.toast{
  position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--amber);color:#1a1408;font-weight:600;font-size:0.85rem;
  padding:10px 20px;border-radius:8px;opacity:0;transition:all .25s;pointer-events:none;z-index:100;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.sitefooter{
  max-width:1400px;margin:0 auto;padding:22px 24px 40px;
  border-top:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;
  font-family:var(--mono);font-size:0.7rem;color:var(--muted);letter-spacing:0.3px;
}
.sitefooter a{color:var(--teal);text-decoration:none;}
.sitefooter a:hover{text-decoration:underline;}

@media (max-width:880px){
  .sidebar{display:none;}
  .topbar{flex-wrap:wrap;}
  .searchwrap{order:3;width:100%;}
}
</style>
</head>

/* =========================================================
   STATE + PERSISTENCE
   ========================================================= */
let state = { prompts: [], blocks: null };
let activeCat = 'all';
let activeTags = new Set();
let searchQuery = '';
let editingId = null;
let blockEditingId = null;

const STORE_KEY = 'promptlib-state-v2';

async function loadState(){
  try{
    const res = await window.storage.get(STORE_KEY, false);
    if(res && res.value){
      state = JSON.parse(res.value);
      // migrate: ensure new default prompts/blocks not lost if schema grows
      if(!state.blocks) state.blocks = JSON.parse(JSON.stringify(DEFAULT_BLOCKS));
      return;
    }
  }catch(e){ /* no existing key */ }
  state = { prompts: JSON.parse(JSON.stringify(DEFAULT_PROMPTS)), blocks: JSON.parse(JSON.stringify(DEFAULT_BLOCKS)) };
  await saveState();
}

async function saveState(){
  try{
    await window.storage.set(STORE_KEY, JSON.stringify(state), false);
  }catch(e){ console.error('save failed', e); }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

function copy(text){
  navigator.clipboard.writeText(text).then(()=>showToast('Prompt copied'));
}

function fullPromptText(p){
  return p.segments.map(s=>s.text.replace(/<[^>]+>/g,'')).join(' ');
}

/* =========================================================
   RENDER: SIDEBAR
   ========================================================= */
function renderSidebar(){
  const catList = document.getElementById('catList');
  const counts = {};
  state.prompts.forEach(p=> counts[p.category] = (counts[p.category]||0)+1 );
  const favCount = state.prompts.filter(p=>p.favorite).length;

  let html = `<li class="cat-item ${activeCat==='all'?'active':''}" data-cat="all"><span>📚 All Prompts</span><span class="count">${state.prompts.length}</span></li>`;
  if(favCount>0){
    html += `<li class="cat-item ${activeCat==='fav'?'active':''}" data-cat="fav"><span>⭐ Favorites</span><span class="count">${favCount}</span></li>`;
  }
  CATEGORIES.forEach(c=>{
    const n = counts[c.id]||0;
    html += `<li class="cat-item ${activeCat===c.id?'active':''}" data-cat="${c.id}"><span>${c.emoji} ${c.label}</span><span class="count">${n}</span></li>`;
  });
  catList.innerHTML = html;
  catList.querySelectorAll('.cat-item').forEach(el=>{
    el.addEventListener('click', ()=>{ activeCat = el.dataset.cat; render(); });
  });

  // tags
  const tagSet = new Set();
  state.prompts.forEach(p=> (p.tags||[]).forEach(t=>tagSet.add(t)) );
  const tagCloud = document.getElementById('tagCloud');
  tagCloud.innerHTML = [...tagSet].sort().map(t=>
    `<span class="tagchip ${activeTags.has(t)?'active':''}" data-tag="${t}">${t}</span>`
  ).join('');
  tagCloud.querySelectorAll('.tagchip').forEach(el=>{
    el.addEventListener('click', ()=>{
      const t = el.dataset.tag;
      activeTags.has(t) ? activeTags.delete(t) : activeTags.add(t);
      render();
    });
  });
}

/* =========================================================
   RENDER: CARD
   ========================================================= */
function starsHtml(p){
  let h = '<span class="stars" data-id="'+p.id+'">';
  for(let i=1;i<=5;i++){ h += `<span data-star="${i}" class="${i<=p.stars?'on':''}">★</span>`; }
  h += '</span>';
  return h;
}

function renderCard(p){
  const isEditing = editingId === p.id;
  const catMeta = CATEGORIES.find(c=>c.id===p.category);

  const titleHtml = isEditing
    ? `<input type="text" class="edit-title" value="${p.title.replace(/"/g,'&quot;')}">`
    : `<div class="card-title" title="${p.title.replace(/"/g,'&quot;')}">${p.title}</div>`;

  const bestForHtml = p.bestFor && p.bestFor.length
    ? `<div class="bestfor">${p.bestFor.map(b=>`<span class="pill">${b}</span>`).join('')}</div>` : '';

  const stackHtml = p.segments.map((s,i)=>{
    const textHtml = isEditing
      ? `<textarea data-seg="${i}">${s.text}</textarea>`
      : `<span class="seg-text">${s.text}</span>`;
    return `<div class="seg"><span class="seg-label">${s.label}</span>${textHtml}</div>`;
  }).join('');

  const promptBoxHtml = isEditing ? '' : `
    <div class="promptbox" data-copy="${p.id}">
      <span class="copyhint">Click to copy</span>
      ${fullPromptText(p)}
    </div>`;

  const tagsHtml = p.tags && p.tags.length
    ? `<div class="card-tags">${p.tags.map(t=>`<span class="mini-tag">#${t}</span>`).join('')}</div>` : '';

  const actionsHtml = isEditing
    ? `<button class="save" data-act="save">Save</button><button data-act="cancel">Cancel</button>`
    : `<button data-act="copy">Copy</button><button data-act="edit">Edit</button><button data-act="dup">Duplicate</button><button class="del" data-act="del">Delete</button>`;

  return `
  <div class="card" data-id="${p.id}">
    <div class="card-head">
      <div class="card-title-wrap">
        ${titleHtml}
        ${starsHtml(p)}
      </div>
      <button class="fav-btn ${p.favorite?'active':''}" data-act="fav" title="Favorite">${p.favorite?'★':'☆'}</button>
    </div>
    ${bestForHtml}
    <div class="stack">${stackHtml}</div>
    ${promptBoxHtml}
    ${tagsHtml}
    <div class="card-actions">${actionsHtml}</div>
  </div>`;
}

function matchesFilter(p){
  if(activeCat==='fav' && !p.favorite) return false;
  if(activeCat!=='all' && activeCat!=='fav' && p.category!==activeCat) return false;
  if(activeTags.size){
    const has = (p.tags||[]).some(t=>activeTags.has(t));
    if(!has) return false;
  }
  if(searchQuery){
    const hay = (p.title+' '+(p.tags||[]).join(' ')+' '+fullPromptText(p)).toLowerCase();
    if(!hay.includes(searchQuery)) return false;
  }
  return true;
}

function renderLibrary(){
  const container = document.getElementById('libraryTab');
  const filtered = state.prompts.filter(matchesFilter);

  if(filtered.length===0){
    container.innerHTML = `<div class="empty"><div class="glyph">🗂</div>No prompts match. Try clearing search or tag filters.</div>`;
    return;
  }

  // group by category, favorites section first if activeCat === 'all'
  let html = '';
  if(activeCat==='all'){
    const favs = filtered.filter(p=>p.favorite);
    if(favs.length){
      html += `<div class="section-heading"><h2>⭐ Favorites</h2><span class="n">${favs.length}</span></div>`;
      html += `<div class="grid">${favs.map(renderCard).join('')}</div>`;
    }
    CATEGORIES.forEach(c=>{
      const items = filtered.filter(p=>p.category===c.id);
      if(!items.length) return;
      html += `<div class="section-heading"><h2>${c.emoji} ${c.label}</h2><span class="n">${items.length}</span></div>`;
      html += `<div class="grid">${items.map(renderCard).join('')}</div>`;
    });
  } else {
    const label = activeCat==='fav' ? '⭐ Favorites' : (CATEGORIES.find(c=>c.id===activeCat)?.emoji+' '+CATEGORIES.find(c=>c.id===activeCat)?.label);
    html += `<div class="section-heading"><h2>${label}</h2><span class="n">${filtered.length}</span></div>`;
    html += `<div class="grid">${filtered.map(renderCard).join('')}</div>`;
  }
  container.innerHTML = html;
  attachCardEvents();
}

function attachCardEvents(){
  document.querySelectorAll('.card').forEach(card=>{
    const id = card.dataset.id;
    const p = state.prompts.find(x=>x.id===id);

    const box = card.querySelector('.promptbox');
    if(box) box.addEventListener('click', ()=>copy(fullPromptText(p)));

    const favBtn = card.querySelector('[data-act="fav"]');
    if(favBtn) favBtn.addEventListener('click', async ()=>{ p.favorite = !p.favorite; await saveState(); render(); });

    const starWrap = card.querySelector('.stars');
    if(starWrap) starWrap.querySelectorAll('[data-star]').forEach(s=>{
      s.addEventListener('click', async ()=>{ p.stars = parseInt(s.dataset.star); await saveState(); render(); });
    });

    const copyBtn = card.querySelector('[data-act="copy"]');
    if(copyBtn) copyBtn.addEventListener('click', ()=>copy(fullPromptText(p)));

    const editBtn = card.querySelector('[data-act="edit"]');
    if(editBtn) editBtn.addEventListener('click', ()=>{ editingId = p.id; render(); });

    const cancelBtn = card.querySelector('[data-act="cancel"]');
    if(cancelBtn) cancelBtn.addEventListener('click', ()=>{ editingId = null; render(); });

    const saveBtn = card.querySelector('[data-act="save"]');
    if(saveBtn) saveBtn.addEventListener('click', async ()=>{
      const titleInput = card.querySelector('.edit-title');
      if(titleInput) p.title = titleInput.value.trim() || p.title;
      card.querySelectorAll('textarea[data-seg]').forEach(ta=>{
        const idx = parseInt(ta.dataset.seg);
        p.segments[idx].text = ta.value;
      });
      editingId = null;
      await saveState();
      render();
      showToast('Saved');
    });

    const dupBtn = card.querySelector('[data-act="dup"]');
    if(dupBtn) dupBtn.addEventListener('click', async ()=>{
      const clone = JSON.parse(JSON.stringify(p));
      clone.id = p.id+'-copy-'+Date.now();
      clone.title = p.title+' (copy)';
      clone.favorite = false;
      const idx = state.prompts.findIndex(x=>x.id===p.id);
      state.prompts.splice(idx+1,0,clone);
      await saveState();
      render();
      showToast('Duplicated');
    });

    const delBtn = card.querySelector('[data-act="del"]');
    if(delBtn) delBtn.addEventListener('click', async ()=>{
      if(!confirm('Delete "'+p.title+'"? This cannot be undone.')) return;
      state.prompts = state.prompts.filter(x=>x.id!==p.id);
      await saveState();
      render();
      showToast('Deleted');
    });
  });
}

  const np = mk(id, 'Untitled Prompt', activeCat!=='all' && activeCat!=='fav' ? activeCat : 'experimental', ['Img2Img'], [], [
    seg('Subject','Describe the subject and what should happen to it.'),
    seg('Rendering','Describe the rendering style, materials, lighting.'),
  ]);
  state.prompts.unshift(np);
  editingId = id;
  await saveState();
  activeCat = 'all';
  render();
  document.querySelector(`.card[data-id="${id}"]`)?.scrollIntoView({behavior:'smooth', block:'center'});
});

/* =========================================================
   RENDER: COMPONENTS TAB
   ========================================================= */
function renderComponents(){
  const container = document.getElementById('componentsTab');
  let html = `<div class="section-heading"><h2>🧠 Prompt Components</h2><span class="n">Reusable blocks you can drop into any prompt</span></div>
  <div class="block-groups">`;

  Object.keys(BLOCK_GROUP_LABELS).forEach(groupKey=>{
    const items = state.blocks[groupKey] || [];
    html += `<div>
      <div class="section-heading" style="margin:0 0 10px;"><h2 style="font-size:0.95rem;">${BLOCK_GROUP_LABELS[groupKey]}</h2><span class="n">${items.length}</span></div>
      <div class="block-grid">`;
    items.forEach(b=>{
      const isEditing = blockEditingId === b.id;
      html += `<div class="block-card" data-group="${groupKey}" data-id="${b.id}">
        <span class="blabel">${b.label}</span>
        ${isEditing ? `<textarea>${b.text}</textarea>` : `<span class="btext">${b.text}</span>`}
        <div class="block-actions">
          ${isEditing
            ? `<button data-act="save">Save</button><button data-act="cancel">Cancel</button>`
            : `<button data-act="copy">Copy</button><button data-act="edit">Edit</button><button data-act="del">Delete</button>`}
        </div>
      </div>`;
    });
    html += `<div class="block-card" data-group="${groupKey}" data-new="1" style="align-items:center;justify-content:center;cursor:pointer;color:var(--muted);">+ Add block</div>`;
    html += `</div></div>`;
  });

  html += `</div>`;
  container.innerHTML = html;
  attachBlockEvents();
}

function attachBlockEvents(){
  document.querySelectorAll('.block-card').forEach(card=>{
    const group = card.dataset.group;
    if(card.dataset.new){
      card.addEventListener('click', async ()=>{
        const id = 'b-custom-'+Date.now();
        state.blocks[group].push({id, label:'New Block', text:'Describe this reusable block…'});
        blockEditingId = id;
        await saveState();
        renderComponents();
      });
      return;
    }
    const id = card.dataset.id;
    const block = state.blocks[group].find(b=>b.id===id);

    const copyBtn = card.querySelector('[data-act="copy"]');
    if(copyBtn) copyBtn.addEventListener('click', ()=>copy(block.text));

    const editBtn = card.querySelector('[data-act="edit"]');
    if(editBtn) editBtn.addEventListener('click', ()=>{ blockEditingId = id; renderComponents(); });

    const cancelBtn = card.querySelector('[data-act="cancel"]');
    if(cancelBtn) cancelBtn.addEventListener('click', ()=>{ blockEditingId = null; renderComponents(); });

    const saveBtn = card.querySelector('[data-act="save"]');
    if(saveBtn) saveBtn.addEventListener('click', async ()=>{
      const ta = card.querySelector('textarea');
      block.text = ta.value;
      blockEditingId = null;
      await saveState();
      renderComponents();
      showToast('Saved');
    });

    const delBtn = card.querySelector('[data-act="del"]');
    if(delBtn) delBtn.addEventListener('click', async ()=>{
      if(!confirm('Delete block "'+block.label+'"?')) return;
      state.blocks[group] = state.blocks[group].filter(b=>b.id!==id);
      await saveState();
      renderComponents();
    });
  });
}

/* =========================================================
   RENDER: BUILDER TAB
   ========================================================= */
function renderBuilder(){
  const container = document.getElementById('builderTab');
  const templateOptions = state.prompts.map(p=>`<option value="${p.id}">${p.title}</option>`).join('');
  const blockOptions = (group)=> `<option value="">— none —</option>` + (state.blocks[group]||[]).map(b=>`<option value="${b.id}">${b.label}</option>`).join('');

  container.innerHTML = `
  <div class="section-heading"><h2>⚙️ Smart Prompt Builder</h2><span class="n">Combine a template with reusable blocks</span></div>
  <div class="builder">
    <div class="builder-panel">
      <h3>1. Choose a base</h3>
      <div class="field">
        <label>Template Prompt</label>
        <select id="bTemplate">${templateOptions}</select>
      </div>
      <div class="field">
        <label>Subject Override (optional)</label>
        <input type="text" id="bSubject" placeholder="e.g. a golden retriever, a 1967 Mustang…">
      </div>

      <h3 style="margin-top:20px;">2. Layer in blocks</h3>
      <div class="field"><label>Identity</label><select id="bIdentity">${blockOptions('identity')}</select></div>
      <div class="field"><label>Lighting</label><select id="bLighting">${blockOptions('lighting')}</select></div>
      <div class="field"><label>Composition</label><select id="bComposition">${blockOptions('composition')}</select></div>
      <div class="field"><label>Camera</label><select id="bCamera">${blockOptions('camera')}</select></div>
      <div class="field"><label>Print</label><select id="bPrint">${blockOptions('print')}</select></div>
      <div class="field"><label>Quality</label><select id="bQuality">${blockOptions('quality')}</select></div>

      <button class="btn-primary" id="bGenerate" style="width:100%;margin-top:6px;">Generate Prompt</button>
    </div>

    <div class="output-panel">
      <h3>Result</h3>
      <div class="output-text" id="bOutput">Choose a template and blocks, then hit Generate.</div>
      <button class="btn-primary" id="bCopy" style="width:100%;">Copy Result</button>
    </div>
  </div>`;

  document.getElementById('bGenerate').addEventListener('click', ()=>{
    const tId = document.getElementById('bTemplate').value;
    const p = state.prompts.find(x=>x.id===tId);
    const subjOverride = document.getElementById('bSubject').value.trim();

    let base = p.segments.map(s=>s.text).join(' ');
    if(subjOverride){
      base = base.replace(/\[[^\]]+\]/g, subjOverride);
    }

    const extras = ['bIdentity','bLighting','bComposition','bCamera','bPrint','bQuality']
      .map(fid=>{
        const sel = document.getElementById(fid);
        const groupMap = {bIdentity:'identity',bLighting:'lighting',bComposition:'composition',bCamera:'camera',bPrint:'print',bQuality:'quality'};
        const group = groupMap[fid];
        const val = sel.value;
        if(!val) return null;
        const block = state.blocks[group].find(b=>b.id===val);
        return block ? block.text : null;
      })
      .filter(Boolean);

    const final = [base, ...extras].join(' ');
    document.getElementById('bOutput').textContent = final;
  });

  document.getElementById('bCopy').addEventListener('click', ()=>{
    const text = document.getElementById('bOutput').textContent;
    if(text && text!=='Choose a template and blocks, then hit Generate.'){
      copy(text);
    }
  });
}

/* =========================================================
   TABS + SEARCH
   ========================================================= */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById('libraryTab').style.display = tab==='library' ? '' : 'none';
    document.getElementById('componentsTab').style.display = tab==='components' ? '' : 'none';
    document.getElementById('builderTab').style.display = tab==='builder' ? '' : 'none';
    document.getElementById('sidebar').style.display = tab==='library' ? '' : 'none';
    if(tab==='components') renderComponents();
    if(tab==='builder') renderBuilder();
  });
});

document.getElementById('searchInput').addEventListener('input', (e)=>{
  searchQuery = e.target.value.trim().toLowerCase();
  renderLibrary();
});

/* =========================================================
   INIT
   ========================================================= */
function render(){
  renderSidebar();
  renderLibrary();
}

(async function init(){
  await loadState();
  render();
})();
</script>

</html>
